name: trace-gate

# Reusable workflow — call from any BLOCK A consumer repo:
#
#   jobs:
#     trace-gate:
#       uses: KooshaPari/phenotype-pm-core/.github/workflows/trace-gate.yml@main
#       with:
#         manifest: trace-gate.toml   # optional, default trace-gate.toml
#         src: src                    # optional, default src
#
# The one-liner adoption snippet:
#   uses: KooshaPari/phenotype-pm-core/.github/workflows/trace-gate.yml@main

on:
  workflow_call:
    inputs:
      manifest:
        description: "Path to trace-gate.toml in the caller repo"
        required: false
        default: "trace-gate.toml"
        type: string
      src:
        description: "Source directory to scan for FR annotations"
        required: false
        default: "src"
        type: string
      push_url:
        description: "Optional Tracera ingest URL (best-effort, no exit-code effect)"
        required: false
        default: ""
        type: string
  # Also allow direct pushes to this repo to test the gate itself.
  push:
    branches: ["main", "feat/**"]
    paths:
      - "crates/trace-gate/**"
      - "crates/traceability-decorators/**"
      - ".github/workflows/trace-gate.yml"
  pull_request:
    paths:
      - "crates/trace-gate/**"
      - "crates/traceability-decorators/**"
      - ".github/workflows/trace-gate.yml"

jobs:
  trace-gate:
    name: FR Coverage Gate
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: /tmp/trace-gate-target

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: trace-gate-cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: trace-gate-cargo-${{ runner.os }}-

      - name: Build trace-gate from phenotype-pm-core
        run: |
          cargo install trace-gate \
            --git https://github.com/KooshaPari/phenotype-pm-core \
            --branch main \
            --locked \
            --root ~/.cargo \
            2>/dev/null || \
          cargo install trace-gate \
            --git https://github.com/KooshaPari/phenotype-pm-core \
            --branch main \
            --root ~/.cargo
        # Fallback: build from local checkout if installing from git fails
        # (useful when this workflow is testing itself on the feat/* branch).

      - name: Self-build fallback (for PRs on phenotype-pm-core itself)
        if: failure()
        run: |
          cargo build --release -p trace-gate
          cp target/release/trace-gate ~/.cargo/bin/trace-gate

      - name: Run trace-gate
        run: |
          PUSH_ARG=""
          if [ -n "${{ inputs.push_url }}" ]; then
            PUSH_ARG="--push ${{ inputs.push_url }}"
          fi
          trace-gate \
            --manifest "${{ inputs.manifest || 'trace-gate.toml' }}" \
            --src "${{ inputs.src || 'src' }}" \
            $PUSH_ARG
        # Exits 0 if all FRs covered, 1 if any are missing.
